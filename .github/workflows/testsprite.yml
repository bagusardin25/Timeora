name: TestSprite — Verification Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: testsprite-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Local quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run backend unit tests
        working-directory: backend
        run: python -m unittest discover -s tests -v

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type-check frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  verify-live:
    name: Live TestSprite gate
    needs: quality
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
      PROJECT_ID: fe31e397-bb11-4aae-af0f-2916b246b3f5
      BACKEND_TEST_ID: 2aadf520-65ff-4f1b-9e28-80406e3fbe28
      FRONTEND_TEST_ID: 5c7bac18-9569-4c14-af7f-17d3bb6d6909
      BACKEND_URL: https://timeora-production.up.railway.app
      FRONTEND_URL: https://timeora-alpha.vercel.app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Require TestSprite credentials
        run: test -n "$TESTSPRITE_API_KEY"

      - name: Install TestSprite CLI
        run: npm install -g @testsprite/testsprite-cli

      - name: Wait for live deployments
        run: |
          for attempt in $(seq 1 40); do
            backend_ready=false
            frontend_ready=false

            if curl --fail --silent --show-error "$BACKEND_URL/api/health" \
              | jq -e '
                .status == "ok"
                and .db == "connected"
                and .auth == "jwt-signature-verified"
              ' >/dev/null; then
              backend_ready=true
            fi

            if curl --fail --silent --show-error "$FRONTEND_URL" \
              | grep --fixed-strings --quiet "$GITHUB_SHA"; then
              frontend_ready=true
            fi

            if [ "$backend_ready" = true ] && [ "$frontend_ready" = true ]; then
              echo "Both live deployments are ready."
              exit 0
            fi

            echo "Attempt $attempt/40: backend=$backend_ready frontend=$frontend_ready"
            sleep 15
          done

          echo "Timed out waiting for live deployments."
          exit 1

      - name: Run backend security smoke
        id: backend
        continue-on-error: true
        run: |
          testsprite test run "$BACKEND_TEST_ID" \
            --target-url "$BACKEND_URL" \
            --wait --timeout 300 --output json > backend_result.json
          cat backend_result.json

      - name: Run strict frontend E2E
        id: frontend
        continue-on-error: true
        run: |
          testsprite test run "$FRONTEND_TEST_ID" \
            --target-url "$FRONTEND_URL" \
            --wait --timeout 600 --output json > frontend_result.json
          cat frontend_result.json

      - name: Write TestSprite summary
        if: always()
        run: |
          echo "## TestSprite verification gate" >> "$GITHUB_STEP_SUMMARY"
          for result in backend_result.json frontend_result.json; do
            echo "### $result" >> "$GITHUB_STEP_SUMMARY"
            if [ -s "$result" ]; then
              echo '```json' >> "$GITHUB_STEP_SUMMARY"
              cat "$result" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            else
              echo "No result was produced." >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Enforce TestSprite verdicts
        env:
          BACKEND_OUTCOME: ${{ steps.backend.outcome }}
          FRONTEND_OUTCOME: ${{ steps.frontend.outcome }}
        run: |
          test "$BACKEND_OUTCOME" = "success"
          test "$FRONTEND_OUTCOME" = "success"

      - name: Download failure bundles
        if: failure()
        run: |
          mkdir -p .testsprite/ci-failures
          for result in backend_result.json frontend_result.json; do
            [ -s "$result" ] || continue
            run_id=$(jq -r '
              .runId
              // .run.id
              // .run.runId
              // .runIdIfAvailable
              // empty
            ' "$result")
            [ -n "$run_id" ] || continue
            testsprite test artifact get "$run_id" \
              --failed-only \
              --out ".testsprite/ci-failures/$run_id" || true
          done

      - name: Upload failure bundles
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testsprite-failures-${{ github.run_id }}
          path: .testsprite/ci-failures
          if-no-files-found: ignore
